<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fantasy World Cup 2026</title>
    <link rel="preload" as="image" href="./assets/prologue/keyboard-room.webp" type="image/webp" fetchpriority="high" />
    <style>
      :root {
        color-scheme: dark;
        background: #020617;
      }

      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
      }

      body {
        background:
          radial-gradient(circle at 50% 18%, rgba(16, 185, 129, 0.16), transparent 32%),
          linear-gradient(135deg, #020617 0%, #050505 58%, #0f172a 100%);
      }

      .startup-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
        color: #d1fae5;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          linear-gradient(90deg, rgba(0, 0, 0, 0.78), rgba(0, 0, 0, 0.28) 48%, rgba(0, 0, 0, 0.66)),
          url("./assets/prologue/keyboard-room.webp") center / cover no-repeat;
      }

      .startup-panel {
        width: min(520px, 100%);
        border: 1px solid rgba(45, 212, 191, 0.22);
        background: rgba(2, 6, 23, 0.72);
        box-shadow: 0 22px 80px rgba(0, 0, 0, 0.46);
        padding: 20px;
      }

      .startup-label {
        margin: 0 0 14px;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(94, 234, 212, 0.92);
      }

      .startup-bar {
        height: 4px;
        overflow: hidden;
        background: rgba(148, 163, 184, 0.14);
      }

      .startup-bar::before {
        content: "";
        display: block;
        height: 100%;
        width: 42%;
        background: #5eead4;
        animation: startup-progress 1.1s ease-in-out infinite;
      }

      @keyframes startup-progress {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(240%); }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-Um8b1rHc.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DYYji4j7.css">
  </head>
  <body>
    <div id="root">
      <div class="startup-shell" aria-label="Loading">
        <div class="startup-panel">
          <p class="startup-label">Fantasy World Cup 2026</p>
          <div class="startup-bar"></div>
        </div>
      </div>
    </div>
  </body>
</html>
